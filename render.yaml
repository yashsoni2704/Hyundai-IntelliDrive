services:
  - type: web
    name: hyundai-chatbot-backend
    runtime: python
    plan: free
    buildCommand: bash build_render.sh
    startCommand: python run_render.py
    healthCheckPath: /health
    envVars:
      - key: LIGHTWEIGHT_MODE
        value: "true"
      - key: EMBEDDING_MODEL
        value: sentence-transformers/all-MiniLM-L6-v2
      - key: CORS_ORIGINS
        value: https://hyundai-intellidrive.onrender.com,https://hyundai-intelli-drive-frontend.vercel.app
      - key: OMP_NUM_THREADS
        value: "1"
      - key: MKL_NUM_THREADS
        value: "1"
      - key: TOKENIZERS_PARALLELISM
        value: "false"
      - key: HF_HOME
        value: /tmp/huggingface
      - key: TRANSFORMERS_CACHE
        value: /tmp/huggingface
      - key: SENTENCE_TRANSFORMERS_HOME
        value: /tmp/sentence_transformers
      - key: DEBUG_MODE
        value: "false"
